<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Defi4-Patroid</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            user-select: none; -webkit-user-select: none;
            font-family: monospace;
            touch-action: none;
        }

        /* ===== ROTATE OVERLAY ===== */
        #rotate-overlay {
            display: none;
            position: fixed; inset: 0; z-index: 9999;
            background: #000;
            flex-direction: column;
            justify-content: center; align-items: center;
            gap: 20px;
            color: #fff;
        }
        #rotate-overlay.visible { display: flex; }
        .rotate-icon {
            font-size: 72px;
            animation: rotateAnim 2s ease-in-out infinite;
        }
        @keyframes rotateAnim {
            0%   { transform: rotate(0deg); }
            40%  { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }
        #rotate-overlay p {
            font-size: 18px; color: #00ffcc; font-family: monospace;
            text-align: center; padding: 0 30px;
        }

        /* ===== GAME WRAPPER ===== */
        #game-wrapper {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            background: #000;
        }

        /* ===== HUD TOP ===== */
        .hud-top {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; height: 36px;
            padding: 0 12px;
            background: rgba(20,20,20,0.95);
            border-bottom: 1px solid #333;
            flex-shrink: 0;
            z-index: 10;
        }
        .hud-text { display: flex; align-items: center; gap: 16px; }
        #room-title { font-size: 13px; font-weight: bold; color: #ff3333; letter-spacing: 1px; }
        #room-coords { font-size: 10px; color: #00ffcc; }

        .minimap-container {
            display: grid; gap: 2px;
            background: #000; padding: 3px;
            border: 1px solid #444; border-radius: 3px;
        }
        .map-pixel { background-color: #333; border-radius: 1px; width: 8px; height: 8px; }
        .map-pixel.active { background-color: #ff3333; animation: clignote 0.6s infinite alternate; }
        @keyframes clignote { from { opacity: 0.3; } to { opacity: 1; } }

        /* ===== CANVAS ZONE ===== */
        #canvas-zone {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #050505;
        }

        /* ===== TRANSPARENT OVERLAY CONTROLS ===== */
        #controls-overlay {
            position: absolute; inset: 0;
            pointer-events: none; /* enfants gèrent les events */
            z-index: 20;
        }

        /* --- D-PAD (bas gauche) --- */
        #dpad {
            position: absolute;
            bottom: 14px; left: 14px;
            display: grid;
            grid-template-columns: repeat(3, 36px);
            grid-template-rows: repeat(3, 36px);
            gap: 3px;
            pointer-events: all;
        }

        /* --- ACTION BUTTONS (bas droite) --- */
        #action-zone {
            position: absolute;
            bottom: 14px; right: 14px;
            display: flex; flex-direction: column;
            align-items: flex-end; gap: 10px;
            pointer-events: all;
        }
        #action-main-row {
            display: flex; gap: 14px; align-items: center;
        }

        /* --- SYSTEM BUTTONS (dans le hud-top) --- */
        #sys-btns {
            display: flex; gap: 6px;
            align-items: center;
        }

        /* ===== BUTTON STYLES ===== */
        .btn-ov {
            background: rgba(80,80,80,0.28);
            border: 2px solid rgba(255,255,255,0.22);
            border-radius: 8px;
            color: rgba(255,255,255,0.75);
            font-weight: bold; font-size: 14px;
            display: flex; justify-content: center; align-items: center;
            width: 36px; height: 36px;
            font-family: monospace;
            cursor: pointer;
            backdrop-filter: blur(1px);
            transition: background 0.1s;
            -webkit-appearance: none;
        }
        .btn-ov:active, .btn-ov.pressed {
            background: rgba(160,160,160,0.45);
            border-color: rgba(255,255,255,0.55);
        }

        .btn-action-ov {
            width: 44px; height: 44px;
            border-radius: 50%;
            font-size: 15px;
            font-family: sans-serif;
        }

        #btn-saut-ov {
            background: rgba(160,0,0,0.30);
            border-color: rgba(255,80,80,0.45);
            color: rgba(255,180,180,0.9);
        }
        #btn-saut-ov:active, #btn-saut-ov.pressed {
            background: rgba(200,0,0,0.55);
        }
        #btn-tir-ov {
            background: rgba(0,140,0,0.28);
            border-color: rgba(80,255,80,0.40);
            color: rgba(160,255,160,0.9);
        }
        #btn-tir-ov:active, #btn-tir-ov.pressed {
            background: rgba(0,180,0,0.50);
        }

        .btn-sys-ov {
            background: rgba(40,40,40,0.45);
            border: 2px solid rgba(255,255,255,0.18);
            border-radius: 6px;
            color: rgba(255,255,255,0.7);
            font-size: 11px; font-weight: bold;
            padding: 0 10px; height: 30px;
            cursor: pointer;
            letter-spacing: 0.5px;
            -webkit-appearance: none;
            pointer-events: all;
        }
        .btn-sys-ov:active { background: rgba(100,100,100,0.55); }

        #btn-start-ov { border-color: rgba(80,200,80,0.4); color: rgba(120,255,120,0.85); }
        #btn-pause-ov  { border-color: rgba(220,220,80,0.35); color: rgba(255,255,140,0.85); }
        #btn-hs-ov     { border-color: rgba(80,80,200,0.35); color: rgba(160,160,255,0.85); }

        /* EXIT button plus petit */
        #btn-exit-ov {
            background: rgba(40,40,40,0.32);
            border: 2px solid rgba(180,180,180,0.22);
            border-radius: 6px;
            color: rgba(200,200,200,0.65);
            font-size: 10px; font-weight: bold;
            padding: 0 10px; height: 26px;
            cursor: pointer;
            -webkit-appearance: none;
            pointer-events: all;
        }
        #btn-exit-ov:active { background: rgba(100,100,100,0.5); }

        /* D-pad grid positions */
        #btn-haut-ov  { grid-column: 2; grid-row: 1; }
        #btn-gauche-ov{ grid-column: 1; grid-row: 2; }
        #btn-droite-ov{ grid-column: 3; grid-row: 2; }
        #btn-bas-ov   { grid-column: 2; grid-row: 3; }

        /* ===== OVERLAYS GAME ===== */
        #exit-overlay {
            display: none; position: fixed; inset: 0; z-index: 999;
            background: rgba(0,0,0,0.85);
            justify-content: center; align-items: center; flex-direction: column;
        }
        #exit-overlay.visible { display: flex; }
        #exit-countdown {
            font-size: 72px; font-weight: bold; color: #ff3333;
            font-family: monospace; text-shadow: 0 0 20px #ff0000;
        }

        .game-overlay {
            display: none; position: fixed; inset: 0; z-index: 500;
            background: rgba(0,0,0,0.92);
            justify-content: center; align-items: center; flex-direction: column; gap: 12px;
        }
        .game-overlay.visible { display: flex; }

        #saisie-titre { font-size: 18px; font-weight: bold; color: #00ffcc; font-family: monospace; }
        #saisie-score-affiche { font-size: 14px; color: #ffff00; font-family: monospace; }
        #saisie-input {
            font-size: 20px; font-family: monospace; padding: 8px 14px;
            background: #1a1a1a; color: #fff; border: 2px solid #00ffcc;
            border-radius: 6px; text-align: center; width: 200px; outline: none;
            text-transform: uppercase;
        }
        #saisie-valider {
            font-size: 14px; font-weight: bold; font-family: monospace;
            background: #224422; border: 2px solid #44aa44; color: #fff;
            padding: 10px 30px; border-radius: 6px; cursor: pointer;
        }
        #hs-titre { font-size: 18px; font-weight: bold; color: #ffcc00; font-family: monospace; margin-bottom: 4px; }
        #hs-nav { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
        #hs-nav button {
            background: #333; border: 2px solid #555; color: #fff;
            font-size: 18px; width: 36px; height: 36px; border-radius: 6px; cursor: pointer;
        }
        #hs-niveau-label { font-size: 14px; color: #00ffcc; font-family: monospace; min-width: 100px; text-align: center; }
        #hs-liste {
            font-family: monospace; font-size: 13px; color: #fff;
            background: #111; border: 2px solid #333; border-radius: 6px;
            padding: 10px 16px; min-width: 260px; min-height: 180px;
        }
        #hs-fermer {
            font-size: 13px; font-weight: bold; font-family: monospace;
            background: #441111; border: 2px solid #aa2222; color: #fff;
            padding: 8px 24px; border-radius: 6px; cursor: pointer; margin-top: 6px;
        }
    </style>
</head>
<body>

<!-- ROTATE OVERLAY -->
<div id="rotate-overlay">
    <div class="rotate-icon">📱</div>
    <p>Veuillez tourner votre appareil<br>en mode <strong>paysage</strong> pour jouer</p>
</div>

<!-- GAME WRAPPER -->
<div id="game-wrapper">

    <!-- HUD TOP -->
    <div class="hud-top">
        <div class="hud-text">
            <div id="room-title">Defi4-Patroid</div>
            <div id="room-coords">ZONE: [X: 0, Y: 0]</div>
        </div>
        <div id="sys-btns">
            <button class="btn-sys-ov" id="btn-start-ov">START</button>
            <button class="btn-sys-ov" id="btn-pause-ov">PAUSE</button>
            <button class="btn-sys-ov" id="btn-hs-ov" style="display:none;">🏆</button>
        </div>
        <div class="minimap-container" id="minimap"></div>
    </div>

    <!-- CANVAS ZONE + CONTROLS OVERLAY -->
    <div id="canvas-zone">
        <canvas id="gameCanvas"></canvas>

        <div id="controls-overlay">

            <!-- D-PAD bas gauche -->
            <div id="dpad">
                <div class="btn-ov" id="btn-haut-ov">▲</div>
                <div class="btn-ov" id="btn-gauche-ov">◀</div>
                <div class="btn-ov" id="btn-droite-ov">▶</div>
                <div class="btn-ov" id="btn-bas-ov">▼</div>
            </div>

            <!-- ACTION BUTTONS bas droite -->
            <div id="action-zone">
                <div id="action-main-row">
                    <div class="btn-ov btn-action-ov" id="btn-saut-ov">A</div>
                    <div class="btn-ov btn-action-ov" id="btn-tir-ov">B</div>
                </div>
                <button id="btn-exit-ov">EXIT</button>
            </div>

        </div>
    </div>
</div>

<!-- EXIT OVERLAY -->
<div id="exit-overlay">
    <div id="exit-countdown">3</div>
</div>

<!-- SAISIE NOM -->
<div class="game-overlay" id="saisie-overlay">
    <div id="saisie-titre">PARTIE TERMINÉE</div>
    <div id="saisie-score-affiche">SCORE : 000000</div>
    <div style="font-size:12px; color:#aaa; font-family:monospace;">Entre ton prénom pour le classement :</div>
    <input id="saisie-input" type="text" maxlength="12" placeholder="PRÉNOM" autocomplete="off" />
    <button id="saisie-valider">VALIDER</button>
</div>

<!-- HIGHSCORES -->
<div class="game-overlay" id="hs-overlay">
    <div id="hs-titre">🏆 HIGHSCORES</div>
    <div id="hs-nav">
        <button id="hs-prev">◀</button>
        <div id="hs-niveau-label">NIV. 0</div>
        <button id="hs-next">▶</button>
    </div>
    <div id="hs-liste"></div>
    <button id="hs-fermer">FERMER</button>
</div>

<script>
    // ===================== ROTATE CHECK =====================
    const rotateOverlay = document.getElementById('rotate-overlay');
    const gameWrapper   = document.getElementById('game-wrapper');

    function checkOrientation() {
        const isPortrait = window.innerHeight > window.innerWidth;
        rotateOverlay.classList.toggle('visible', isPortrait);
        gameWrapper.style.display = isPortrait ? 'none' : 'flex';
    }
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', () => setTimeout(checkOrientation, 200));
    checkOrientation();

    // ===================== CANVAS SETUP =====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Résolution logique fixe du jeu
    const GAME_W = 400;
    const GAME_H = 300;

    canvas.width  = GAME_W;
    canvas.height = GAME_H;

    // Le canvas est étiré en CSS width:100% height:100%
    // Les coordonnées de jeu restent 400×300, le CSS fait le scaling

    // ===================== GAME VARIABLES =====================
    const roomCoords = document.getElementById('room-coords');
    const minimap    = document.getElementById('minimap');

    let gameState = 'TITLE';
    let niveauChoisi = 0;
    let tailleMonde = 2;
    let tailleMondeH = 2;

    let score = 0;
    let chiffresTrouves = 0;
    let totalChiffres = 5;

    let player = {
        x: 190, y: 240, width: 20, height: 32,
        vitesseX: 0, vitesseY: 0, compteurSauts: 0,
        regardX: 1, auSol: true, energie: 99, maxEnergie: 99, clignotementInvuln: 0,
        timerFlashTir: 0
    };

    let bullets = [];
    let enemies = [];
    let roomItems = [];

    const gravite = 0.5;
    const vitesseCourse = 4;
    const puissanceSaut = -8.5;

    let carteX = 0;
    let carteY = 0;
    let monde = [];

    let enTransition = false;
    let transitionType = "";
    let transitionTimer = 0;
    const dureeTransition = 30;
    let ancX = 0, ancY = 0;
    let nouvX = 0, nouvY = 0;
    let offsetCamY = 0;
    let offsetCamX = 0;

    let tickAnimation = 0;

    // ===================== AUDIO =====================
    let audioCtx = null;
    let introInterval = null;

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function jouerNote(frequence, typeOnde, volume, depart, duree) {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = typeOnde;
        osc.frequency.setValueAtTime(frequence, audioCtx.currentTime + depart);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime + depart);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + depart + duree);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + depart);
        osc.stop(audioCtx.currentTime + depart + duree);
    }

    function gererMusiqueIntro(activer) {
        initAudio();
        if (!activer) { if (introInterval) { clearInterval(introInterval); introInterval = null; } return; }
        if (introInterval) return;
        const notesIntro = [130.81, 146.83, 155.56, 196.00, 155.56, 196.00, 220.00, 196.00];
        let indexNote = 0;
        introInterval = setInterval(() => {
            if (gameState === 'TITLE') { jouerNote(notesIntro[indexNote], 'triangle', 0.08, 0, 0.25); indexNote = (indexNote + 1) % notesIntro.length; }
            else gererMusiqueIntro(false);
        }, 250);
    }

    function jouerFanfareVictoire() {
        gererMusiqueIntro(false);
        let r = 0.12;
        jouerNote(261.63,'square',0.1,0*r,0.1); jouerNote(329.63,'square',0.1,1*r,0.1);
        jouerNote(392.00,'square',0.1,2*r,0.1); jouerNote(523.25,'square',0.1,3*r,0.15);
        jouerNote(392.00,'square',0.1,4.5*r,0.1); jouerNote(523.25,'square',0.12,5.5*r,0.4);
    }

    function jouerFanfareDefaite() {
        gererMusiqueIntro(false);
        let r = 0.16;
        jouerNote(220.00,'sawtooth',0.12,0*r,0.15); jouerNote(207.65,'sawtooth',0.12,1*r,0.15);
        jouerNote(196.00,'sawtooth',0.12,2*r,0.15); jouerNote(174.61,'sawtooth',0.15,3*r,0.5);
    }

    function jouerSon(type) {
        initAudio();
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        let t = audioCtx.currentTime;
        if (type === 'tir') {
            osc.type='triangle'; osc.frequency.setValueAtTime(600,t); osc.frequency.exponentialRampToValueAtTime(150,t+0.12);
            gain.gain.setValueAtTime(0.15,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.12);
            osc.start(t); osc.stop(t+0.12);
        } else if (type === 'saut') {
            osc.type='sine'; osc.frequency.setValueAtTime(200,t); osc.frequency.exponentialRampToValueAtTime(500,t+0.1);
            gain.gain.setValueAtTime(0.15,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.1);
            osc.start(t); osc.stop(t+0.1);
        } else if (type === 'degat') {
            osc.type='sawtooth'; osc.frequency.setValueAtTime(180,t); osc.frequency.linearRampToValueAtTime(60,t+0.2);
            gain.gain.setValueAtTime(0.2,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.2);
            osc.start(t); osc.stop(t+0.2);
        } else if (type === 'item') {
            osc.type='square'; osc.frequency.setValueAtTime(523.25,t); osc.frequency.setValueAtTime(659.25,t+0.08);
            gain.gain.setValueAtTime(0.1,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.2);
            osc.start(t); osc.stop(t+0.2);
        } else if (type === 'explosion') {
            osc.type='sawtooth'; osc.frequency.setValueAtTime(120,t); osc.frequency.linearRampToValueAtTime(30,t+0.15);
            gain.gain.setValueAtTime(0.25,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.15);
            osc.start(t); osc.stop(t+0.15);
        }
    }

    // ===================== MENU =====================
    const boutonsMenu = [
        { id: 0, x: 30,  y: 90, w: 70, h: 25 },
        { id: 1, x: 110, y: 90, w: 70, h: 25 },
        { id: 2, x: 190, y: 90, w: 70, h: 25 },
        { id: 3, x: 270, y: 90, w: 70, h: 25 }
    ];

    // ===================== GÉNÉRATION MONDE =====================
    function genererMonde(taille, tailleH) {
        tailleMonde = taille;
        tailleMondeH = tailleH !== undefined ? tailleH : taille;
        monde = Array(tailleMonde).fill(null).map(() => Array(tailleMondeH).fill(null));

        if (niveauChoisi === 0) totalChiffres = 3;
        else if (niveauChoisi === 1) totalChiffres = 5;
        else if (niveauChoisi === 2) totalChiffres = 10;
        else if (niveauChoisi === 3) totalChiffres = 15;

        carteX = Math.floor(tailleMonde / 2);
        carteY = tailleMondeH - 1;

        for (let x = 0; x < tailleMonde; x++) {
            for (let y = 0; y < tailleMondeH; y++) {
                let platesformes = [];
                let ennemis = [];
                if (x % 2 === 0) {
                    platesformes.push({ x: 40, y: 180, w: 100, h: 15 });
                    platesformes.push({ x: 260, y: 100, w: 100, h: 15 });
                    if (y === tailleMondeH - 1) { platesformes.push({ x: 0, y: 285, w: 400, h: 15 }); }
                    else { platesformes.push({ x: 0, y: 285, w: 130, h: 15 }); platesformes.push({ x: 270, y: 285, w: 130, h: 15 }); }
                    if (y === 0) { platesformes.push({ x: 0, y: 0, w: 400, h: 15 }); }
                    else { platesformes.push({ x: 0, y: 0, w: 130, h: 15 }); platesformes.push({ x: 270, y: 0, w: 130, h: 15 }); }
                    if (!(x === carteX && y === carteY)) {
                        ennemis.push({ type: 'volant', x: 200, y: 140, w: 24, h: 16, angle: 0, xOrigine: 200, yOrigine: 140 });
                        ennemis.push({ type: 'volant', x: 200, y: 80, w: 24, h: 16, angle: Math.PI, xOrigine: 200, yOrigine: 80 });
                        ennemis.push({ type: 'rampant', x: 50, y: 170, w: 24, h: 10, vX: 1.0, limiteG: 45, limiteD: 115 });
                    }
                } else {
                    platesformes.push({ x: 120, y: 160, w: 160, h: 15 });
                    platesformes.push({ x: 0, y: 245, w: 100, h: 15 });
                    platesformes.push({ x: 300, y: 245, w: 100, h: 15 });
                    platesformes.push({ x: 0, y: 0, w: 400, h: 15 });
                    platesformes.push({ x: 0, y: 285, w: 400, h: 15 });
                    ennemis.push({ type: 'rampant', x: 140, y: 150, w: 24, h: 10, vX: 1.2, limiteG: 125, limiteD: 250 });
                    ennemis.push({ type: 'rampant', x: 20, y: 235, w: 24, h: 10, vX: -1.0, limiteG: 5, limiteD: 75 });
                    ennemis.push({ type: 'volant', x: 200, y: 70, w: 24, h: 16, angle: x * 1.5, xOrigine: 200, yOrigine: 70 });
                }
                monde[x][y] = { plateformes: platesformes, ennemis: ennemis, objets: [] };
            }
        }

        let chiffresAPlacer = [];
        for (let i = 1; i <= totalChiffres; i++) chiffresAPlacer.push(i);

        if (niveauChoisi === 0) {
            let chiffresMelanges = [1, 2, 3];
            for (let i = chiffresMelanges.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [chiffresMelanges[i], chiffresMelanges[j]] = [chiffresMelanges[j], chiffresMelanges[i]];
            }
            for (let sx = 0; sx < 3; sx++) {
                let salle = monde[sx][0];
                let platsValides = salle.plateformes.filter(p => p.y > 0 && p.y < 285);
                let plat = platsValides[Math.floor(Math.random() * platsValides.length)];
                salle.objets.push({ valeur: chiffresMelanges[sx], x: plat.x + 20, y: plat.y - 25, w: 16, h: 20, yPlat: plat.y });
            }
        } else {
            let prot = 0;
            while (chiffresAPlacer.length > 0 && prot < 2000) {
                prot++;
                let rx = Math.floor(Math.random() * tailleMonde);
                let ry = Math.floor(Math.random() * tailleMondeH);
                if (!monde[rx] || !monde[rx][ry]) continue;
                let salle = monde[rx][ry];
                if (salle.plateformes && salle.plateformes.length > 0) {
                    let platIdx = Math.floor(Math.random() * salle.plateformes.length);
                    let plat = salle.plateformes[platIdx];
                    if (plat.y <= 0 || plat.y >= 285) continue;
                    let objetsSurCettePlat = salle.objets.filter(o => o.yPlat === plat.y);
                    let decalage = (objetsSurCettePlat.length * 40) + 20;
                    let cibleX = plat.x + decalage;
                    if (cibleX > (plat.x + plat.w - 20)) continue;
                    let cibleY = plat.y - 25;
                    let valeurChiffre = chiffresAPlacer.shift();
                    salle.objets.push({ valeur: valeurChiffre, x: cibleX, y: cibleY, w: 16, h: 20, yPlat: plat.y });
                }
            }
        }
    }

    function dessinerMinimap() {
        minimap.innerHTML = "";
        let t = tailleMonde || 2;
        let th = tailleMondeH || t;
        if (gameState === 'TITLE') {
            if (niveauChoisi === 0) { t = 3; th = 1; }
            else if (niveauChoisi === 1) { t = 2; th = 2; }
            else if (niveauChoisi === 2) { t = 3; th = 3; }
            else { t = 5; th = 5; }
        }
        minimap.style.gridTemplateColumns = `repeat(${t}, 8px)`;
        minimap.style.gridTemplateRows    = `repeat(${th}, 8px)`;
        let activeX = Math.floor(t / 2);
        let activeY = th - 1;
        for (let y = 0; y < th; y++) {
            for (let x = 0; x < t; x++) {
                const pixel = document.createElement('div');
                pixel.classList.add('map-pixel');
                if (gameState === 'TITLE') { if (x === activeX && y === activeY) pixel.classList.add('active'); }
                else { if (x === carteX && y === carteY) pixel.classList.add('active'); }
                minimap.appendChild(pixel);
            }
        }
    }

    function chargerSalle(cx, cy) {
        if (!monde || !monde[cx] || !monde[cx][cy]) return;
        carteX = cx; carteY = cy;
        roomCoords.textContent = `ZONE: [X: ${carteX}, Y: ${carteY}]`;
        enemies   = JSON.parse(JSON.stringify(monde[carteX][carteY].ennemis || []));
        roomItems = JSON.parse(JSON.stringify(monde[carteX][carteY].objets  || []));
        dessinerMinimap();
    }

    function initierTransition(prochainX, prochainY, direction) {
        if (!monde || !monde[prochainX] || !monde[prochainX][prochainY]) return;
        if (monde[carteX] && monde[carteX][carteY]) monde[carteX][carteY].objets = [...roomItems];
        enTransition = true; transitionType = direction; transitionTimer = 0;
        ancX = carteX; ancY = carteY; nouvX = prochainX; nouvY = prochainY;
        bullets = [];
    }

    function finaliserTransition() {
        enTransition = false;
        carteX = nouvX; carteY = nouvY;
        offsetCamX = 0; offsetCamY = 0;
        roomCoords.textContent = `ZONE: [X: ${carteX}, Y: ${carteY}]`;
        if (transitionType === "droite") player.x = 10;
        if (transitionType === "gauche") player.x = canvas.width - player.width - 10;
        if (transitionType === "haut")   player.y = canvas.height - player.height - 20;
        if (transitionType === "bas")    player.y = 20;
        if (monde && monde[carteX] && monde[carteX][carteY]) {
            enemies   = JSON.parse(JSON.stringify(monde[carteX][carteY].ennemis || []));
            roomItems = JSON.parse(JSON.stringify(monde[carteX][carteY].objets  || []));
        }
        dessinerMinimap();
    }

    // ===================== CONTROLS =====================
    const commandes = { gauche: false, droite: false, haut: false, bas: false };

    function lierBoutonOverlay(id, propriete) {
        const btn = document.getElementById(id);
        if (!btn) return;
        const press   = (e) => { e.preventDefault(); if (gameState === 'PLAYING') commandes[propriete] = true; btn.classList.add('pressed'); };
        const release = (e) => { e.preventDefault(); commandes[propriete] = false; btn.classList.remove('pressed'); };
        btn.addEventListener('touchstart', press,   { passive: false });
        btn.addEventListener('touchend',   release);
        btn.addEventListener('touchcancel',release);
        btn.addEventListener('mousedown',  press);
        btn.addEventListener('mouseup',    release);
        btn.addEventListener('mouseleave', release);
    }
    lierBoutonOverlay('btn-gauche-ov', 'gauche');
    lierBoutonOverlay('btn-droite-ov', 'droite');
    lierBoutonOverlay('btn-haut-ov',   'haut');
    lierBoutonOverlay('btn-bas-ov',    'bas');

    // Clavier
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft')  commandes.gauche = true;
        if (e.key === 'ArrowRight') commandes.droite = true;
        if (e.key === 'ArrowUp')    commandes.haut   = true;
        if (e.key === 'ArrowDown')  commandes.bas    = true;
        if (e.key === ' ' || e.key === 'z') gererSaut();
        if (e.key === 'x') gererTir();
    });
    document.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowLeft')  commandes.gauche = false;
        if (e.key === 'ArrowRight') commandes.droite = false;
        if (e.key === 'ArrowUp')    commandes.haut   = false;
        if (e.key === 'ArrowDown')  commandes.bas    = false;
    });

    function gererSaut(e) {
        if (e) e.preventDefault();
        initAudio();
        if (gameState !== 'PLAYING' || enTransition) return;
        if (player.compteurSauts < 2) { jouerSon('saut'); player.vitesseY = puissanceSaut; player.compteurSauts++; player.auSol = false; }
    }
    function gererTir(e) {
        if (e) e.preventDefault();
        initAudio();
        if (gameState !== 'PLAYING' || enTransition) return;
        jouerSon('tir');
        let vx = 0; let vy = 0;
        if (commandes.haut) vy = -7;
        else if (commandes.bas && !player.auSol) vy = 7;
        else vx = player.regardX * 7;
        bullets.push({ x: player.x + player.width / 2, y: player.y + player.height / 3, vX: vx, vY: vy, taille: 5 });
        player.timerFlashTir = 5;
    }

    const btnSautOv = document.getElementById('btn-saut-ov');
    const btnTirOv  = document.getElementById('btn-tir-ov');
    btnSautOv.addEventListener('touchstart', gererSaut, { passive: false });
    btnSautOv.addEventListener('mousedown',  gererSaut);
    btnTirOv.addEventListener('touchstart',  gererTir,  { passive: false });
    btnTirOv.addEventListener('mousedown',   gererTir);

    // START / PAUSE
    function declencherStart(e) {
        if (e) { e.preventDefault(); e.stopPropagation(); }
        initAudio();
        if (gameState === 'TITLE') lancerLeJeu();
        else if (gameState === 'PAUSE') gameState = 'PLAYING';
        else if (gameState === 'GAMEOVER' || gameState === 'VICTORY') recommencerJeu();
    }
    function declencherPause(e) {
        if (e) { e.preventDefault(); e.stopPropagation(); }
        if (gameState === 'PLAYING') gameState = 'PAUSE';
    }
    document.getElementById('btn-start-ov').addEventListener('touchstart', declencherStart, { passive: false });
    document.getElementById('btn-start-ov').addEventListener('click',      declencherStart);
    document.getElementById('btn-pause-ov').addEventListener('touchstart', declencherPause, { passive: false });
    document.getElementById('btn-pause-ov').addEventListener('click',      declencherPause);

    // MENU CLICK
    function detecterSelectionMenu(e) {
        gererMusiqueIntro(true);
        if (gameState !== 'TITLE') return;
        e.preventDefault();
        const rect   = canvas.getBoundingClientRect();
        const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
        const clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
        // Convertir coordonnées écran → coordonnées logiques canvas
        const scaleX = GAME_W / rect.width;
        const scaleY = GAME_H / rect.height;
        const xCanvas = (clientX - rect.left) * scaleX;
        const yCanvas = (clientY - rect.top)  * scaleY;
        for (let btn of boutonsMenu) {
            if (xCanvas >= btn.x && xCanvas <= (btn.x + btn.w) && yCanvas >= btn.y && yCanvas <= (btn.y + btn.h)) {
                niveauChoisi = btn.id;
                let t = 2; let th = 2;
                if (niveauChoisi === 0) { t = 3; th = 1; }
                else if (niveauChoisi === 2) { t = 3; th = 3; }
                else if (niveauChoisi === 3) { t = 5; th = 5; }
                genererMonde(t, th);
                dessinerMinimap();
                break;
            }
        }
    }
    canvas.addEventListener('mousedown', detecterSelectionMenu);
    canvas.addEventListener('touchstart', detecterSelectionMenu, { passive: false });

    // EXIT
    let exitTimer = null, exitCompte = 0, exitInterval = null;
    const exitOverlay   = document.getElementById('exit-overlay');
    const exitCountdown = document.getElementById('exit-countdown');

    function annulerExit() {
        if (exitTimer)    { clearTimeout(exitTimer);   exitTimer    = null; }
        if (exitInterval) { clearInterval(exitInterval); exitInterval = null; }
        exitOverlay.classList.remove('visible');
    }
    function lancerCompteRebours() {
        exitCompte = 3; exitCountdown.textContent = '3';
        exitOverlay.classList.add('visible');
        exitInterval = setInterval(() => {
            exitCompte--;
            if (exitCompte > 0) { exitCountdown.textContent = String(exitCompte); }
            else {
                clearInterval(exitInterval); exitInterval = null;
                exitCountdown.textContent = 'EXIT';
                setTimeout(() => {
                    exitOverlay.classList.remove('visible');
                    if (gameState === 'TITLE') {
                        window.close();
                        document.body.innerHTML = '<div style="color:#fff;background:#000;height:100vh;display:flex;align-items:center;justify-content:center;font-size:24px;font-family:monospace;">Programme terminé.</div>';
                    } else recommencerJeu();
                }, 600);
            }
        }, 1000);
    }
    const btnExitOv = document.getElementById('btn-exit-ov');
    btnExitOv.addEventListener('mousedown',   (e) => { e.preventDefault(); exitTimer = setTimeout(lancerCompteRebours, 400); });
    btnExitOv.addEventListener('mouseup',     annulerExit);
    btnExitOv.addEventListener('mouseleave',  annulerExit);
    btnExitOv.addEventListener('touchstart',  (e) => { e.preventDefault(); exitTimer = setTimeout(lancerCompteRebours, 400); }, { passive: false });
    btnExitOv.addEventListener('touchend',    annulerExit);
    btnExitOv.addEventListener('touchcancel', annulerExit);

    // ===================== GAME LOGIC =====================
    function lancerLeJeu() {
        gererMusiqueIntro(false);
        let t = 2; let th = 2;
        if (niveauChoisi === 0) { t = 3; th = 1; }
        else if (niveauChoisi === 2) { t = 3; th = 3; }
        else if (niveauChoisi === 3) { t = 5; th = 5; }
        genererMonde(t, th);
        let startX = Math.floor(t / 2);
        let startY = th - 1;
        chargerSalle(startX, startY);
        player.energie = 99; score = 0; chiffresTrouves = 0;
        player.x = 190; player.y = 240; player.vitesseX = 0; player.vitesseY = 0;
        gameState = 'PLAYING';
        majVisibiliteHs();
    }

    function recommencerJeu() {
        gameState = 'TITLE';
        niveauChoisi = 0; tailleMonde = 3; tailleMondeH = 1;
        genererMonde(3, 1);
        dessinerMinimap();
        gererMusiqueIntro(true);
        majVisibiliteHs();
    }

    function gererCollisionsPlatesformes() {
        player.auSol = false;
        if (!monde || !monde[carteX] || !monde[carteX][carteY]) return;
        let platesformes = monde[carteX][carteY].plateformes || [];
        for (let plat of platesformes) {
            if (player.x < plat.x + plat.w && player.x + player.width > plat.x &&
                player.y < plat.y + plat.h && player.y + player.height > plat.y) {
                if (player.vitesseY >= 0 && (player.y + player.height - player.vitesseY) <= plat.y + 12) {
                    player.y = plat.y - player.height; player.vitesseY = 0; player.compteurSauts = 0; player.auSol = true;
                } else if (player.vitesseY < 0 && (player.y - player.vitesseY) >= (plat.y + plat.h - 12)) {
                    player.y = plat.y + plat.h; player.vitesseY = 0;
                }
            }
        }
    }

    function verifierCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.w && rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.h && rect1.y + rect1.height > rect2.y;
    }

    function update() {
        if (gameState === 'TITLE') { if (audioCtx && audioCtx.state === 'running') gererMusiqueIntro(true); return; }
        if (gameState !== 'PLAYING') return;

        tickAnimation++;
        if (player.timerFlashTir > 0) player.timerFlashTir--;

        if (enTransition) {
            transitionTimer++;
            let p = transitionTimer / dureeTransition;
            if (transitionType === "bas")    { offsetCamY = -canvas.height * p; player.y = 15 - (canvas.height * (1 - p)); }
            else if (transitionType === "haut")  { offsetCamY = canvas.height * p;  player.y = (canvas.height - player.height - 15) + (canvas.height * (1 - p)); }
            else if (transitionType === "droite"){ offsetCamX = -canvas.width * p;  player.x = 5 - (canvas.width * (1 - p)); }
            else if (transitionType === "gauche"){ offsetCamX = canvas.width * p;   player.x = (canvas.width - player.width - 5) + (canvas.width * (1 - p)); }
            if (transitionTimer >= dureeTransition) finaliserTransition();
            return;
        }

        if (player.clignotementInvuln > 0) player.clignotementInvuln--;

        if (commandes.gauche)       { player.vitesseX = -vitesseCourse; player.regardX = -1; }
        else if (commandes.droite)  { player.vitesseX = vitesseCourse;  player.regardX = 1; }
        else                         player.vitesseX = 0;

        player.x += player.vitesseX;
        player.vitesseY += gravite;
        player.y += player.vitesseY;
        gererCollisionsPlatesformes();

        if (player.clignotementInvuln === 0 && roomItems) {
            for (let i = roomItems.length - 1; i >= 0; i--) {
                let item = roomItems[i];
                if (verifierCollision(player, item)) {
                    let cifraAttesa = chiffresTrouves + 1;
                    if (item.valeur === cifraAttesa) {
                        roomItems.splice(i, 1);
                        jouerSon('item');
                        if (monde && monde[carteX] && monde[carteX][carteY]) monde[carteX][carteY].objets = [...roomItems];
                        chiffresTrouves++;
                        score += 1000;
                        if (chiffresTrouves >= totalChiffres) { gameState = 'VICTORY'; jouerFanfareVictoire(); setTimeout(() => afficherSaisieNom(true), 1500); }
                    } else {
                        let penalite = niveauChoisi === 0 ? 3 : 5;
                        player.energie -= penalite;
                        jouerSon('degat');
                        player.clignotementInvuln = 45;
                        if (player.energie <= 0) { player.energie = 0; gameState = 'GAMEOVER'; jouerFanfareDefaite(); setTimeout(() => afficherSaisieNom(false), 1500); }
                    }
                }
            }
        }

        if (player.x > canvas.width - player.width + 5) { if (carteX < tailleMonde - 1) initierTransition(carteX + 1, carteY, "droite"); else player.x = canvas.width - player.width; }
        if (player.x < -5)                               { if (carteX > 0) initierTransition(carteX - 1, carteY, "gauche"); else player.x = 0; }
        if (player.y < -player.height + 5)               { if (carteY > 0) initierTransition(carteX, carteY - 1, "haut"); else { player.y = 0; player.vitesseY = 0; } }
        if (player.y > canvas.height - 5)                { if (carteY < tailleMondeH - 1) initierTransition(carteX, carteY + 1, "bas"); else { player.y = canvas.height - player.height; player.vitesseY = 0; } }

        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i]; b.x += b.vX; b.y += b.vY;
            let detruit = false;
            if (enemies) {
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (verifierCollision({ x: b.x, y: b.y, width: b.taille, height: b.taille }, enemies[j])) {
                        enemies.splice(j, 1); jouerSon('explosion'); detruit = true; score += 100; break;
                    }
                }
            }
            if (detruit || b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
        }

        if (enemies) {
            for (let e of enemies) {
                if (e.type === 'rampant') { e.x += e.vX; if (e.x < e.limiteG || e.x > e.limiteD) e.vX = -e.vX; }
                else if (e.type === 'volant') { e.angle += 0.05; e.x = e.xOrigine + Math.cos(e.angle) * 35; e.y = e.yOrigine + Math.sin(e.angle) * 25; }
                if (player.clignotementInvuln === 0 && verifierCollision(player, e)) {
                    player.energie -= niveauChoisi === 0 ? 3 : 5;
                    jouerSon('degat');
                    player.clignotementInvuln = 60;
                    player.vitesseY = -4; player.vitesseX = player.regardX === 1 ? -5 : 5; player.x += player.vitesseX;
                    if (player.energie <= 0) { player.energie = 0; gameState = 'GAMEOVER'; jouerFanfareDefaite(); setTimeout(() => afficherSaisieNom(false), 1500); }
                }
            }
        }
    }

    // ===================== DRAW =====================
    function dessinerMonstre(e, ox, oy) {
        let posX = e.x + ox; let posY = e.y + oy;
        if (e.type === 'rampant') {
            ctx.fillStyle = '#ff3333';
            let dir = e.vX > 0 ? 1 : -1;
            for (let i = 0; i < e.w; i += 2) { let my = Math.sin((tickAnimation * 0.2) + (i * 0.5)) * 3; ctx.fillRect(posX + i, posY + my + 4, 3, 4); }
            ctx.fillStyle = '#ff6666';
            if (dir === 1) ctx.fillRect(posX + e.w - 2, posY + Math.sin((tickAnimation * 0.2) + (e.w * 0.5)) * 3 + 2, 4, 5);
            else           ctx.fillRect(posX,            posY + Math.sin((tickAnimation * 0.2)) * 3 + 2, 4, 5);
        } else if (e.type === 'volant') {
            let cx = posX + (e.w / 2); let cy = posY + (e.h / 2);
            let bat = Math.sin(tickAnimation * 0.25);
            ctx.fillStyle = '#cc33ff';
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx - 12, cy - (bat * 7)); ctx.lineTo(cx - 6, cy + 4); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + 12, cy - (bat * 7)); ctx.lineTo(cx + 6, cy + 4); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#8811aa'; ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill();
            ctx.fillRect(cx - 2, cy - 6, 1, 3); ctx.fillRect(cx + 1, cy - 6, 1, 3);
        }
    }

    function dessinerJoueur() {
        if (player.clignotementInvuln % 4 >= 2) return;
        let px = player.x; let py = player.y; let pw = player.width; let ph = player.height;
        let decalLeg1 = 0, decalLeg2 = 0, ecart1 = 0, ecart2 = 0;
        if (!player.auSol) { decalLeg1 = -3; decalLeg2 = -2; ecart1 = -1; ecart2 = 1; }
        else if (player.vitesseX !== 0) {
            let c = Math.floor(tickAnimation / 6) % 2;
            if (c === 0) { decalLeg1 = -3; decalLeg2 = 0; } else { decalLeg1 = 0; decalLeg2 = -3; }
        }
        ctx.fillStyle = '#228B22';
        ctx.fillRect(px + 2 + ecart1, py + 24 + (decalLeg1 < 0 && player.auSol ? 1 : 0), 5, 8 + decalLeg1);
        ctx.fillRect(px + pw - 7 + ecart2, py + 24 + (decalLeg2 < 0 && player.auSol ? 1 : 0), 5, 8 + decalLeg2);
        ctx.fillStyle = '#556B2F';
        ctx.fillRect(px + 1 + ecart1, py + 30 + decalLeg1, 6, 2);
        ctx.fillRect(px + pw - 8 + ecart2, py + 30 + decalLeg2, 6, 2);
        ctx.fillStyle = '#8B4513';
        if (player.regardX === 1) { ctx.beginPath(); ctx.arc(px + 4, py + 18, 7, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#DAA520'; ctx.fillRect(px - 1, py + 11, 4, 14); }
        else { ctx.beginPath(); ctx.arc(px + pw - 4, py + 18, 7, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#DAA520'; ctx.fillRect(px + pw - 3, py + 11, 4, 14); }
        ctx.fillStyle = '#F5DEB3'; ctx.fillRect(px + 3, py + 12, pw - 6, 12);
        ctx.fillStyle = '#32CD32'; ctx.beginPath(); ctx.arc(px + pw / 2, py + 9, 6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#FF0000'; ctx.beginPath(); ctx.arc(px + pw / 2, py + 7, 6, Math.PI, 0); ctx.fill();
        if (player.regardX === 1) ctx.fillRect(px + pw / 2, py + 6, 9, 2); else ctx.fillRect(px + pw / 2 - 9, py + 6, 9, 2);
        ctx.fillStyle = '#000000';
        if (player.regardX === 1) ctx.fillRect(px + pw / 2 + 2, py + 7, 2, 2); else ctx.fillRect(px + pw / 2 - 4, py + 7, 2, 2);
        ctx.fillStyle = '#777777';
        let flashX = 0, flashY = 0;
        if (commandes.haut) {
            ctx.fillRect(px + (player.regardX === 1 ? pw / 2 : pw / 2 - 3), py - 4, 3, 10);
            ctx.fillStyle = '#444444'; ctx.fillRect(px + (player.regardX === 1 ? pw / 2 + 1 : pw / 2 - 4), py + 6, 3, 8);
            flashX = px + (player.regardX === 1 ? pw / 2 + 1 : pw / 2 - 2); flashY = py - 7;
        } else if (commandes.bas && !player.auSol) {
            ctx.fillRect(px + (player.regardX === 1 ? pw / 2 + 2 : pw / 2 - 5), py + 26, 3, 10);
            ctx.fillStyle = '#444444'; ctx.fillRect(px + (player.regardX === 1 ? pw / 2 + 1 : pw / 2 - 4), py + 16, 3, 10);
            flashX = px + (player.regardX === 1 ? pw / 2 + 3 : pw / 2 - 4); flashY = py + 38;
        } else {
            ctx.fillStyle = '#555555';
            if (player.regardX === 1) {
                ctx.fillRect(px + pw - 4, py + 14, 8, 4);
                ctx.fillStyle = '#777777'; ctx.fillRect(px + pw + 2, py + 12, 6, 3); ctx.fillRect(px + pw + 1, py + 14, 2, 4);
                flashX = px + pw + 10; flashY = py + 13;
            } else {
                ctx.fillRect(px - 4, py + 14, 8, 4);
                ctx.fillStyle = '#777777'; ctx.fillRect(px - 8, py + 12, 6, 3); ctx.fillRect(px - 3, py + 14, 2, 4);
                flashX = px - 11; flashY = py + 13;
            }
        }
        if (player.timerFlashTir > 0) { ctx.fillStyle = '#ffff00'; ctx.beginPath(); ctx.arc(flashX, flashY, 5, 0, Math.PI * 2); ctx.fill(); }
    }

    function dessinerContenuSalle(salleX, salleY, ox, oy) {
        if (!monde || !monde[salleX] || !monde[salleX][salleY]) return;
        let s = monde[salleX][salleY];
        ctx.fillStyle = '#444';
        if (s.plateformes) for (let plat of s.plateformes) ctx.fillRect(plat.x + ox, plat.y + oy, plat.w, plat.h);
        let objsAD = salleX === carteX && salleY === carteY ? roomItems : (s.objets || []);
        if (objsAD) {
            for (let obj of objsAD) {
                ctx.fillStyle = '#ffff00'; ctx.font = 'bold 16px monospace';
                ctx.fillText(obj.valeur, obj.x + ox, obj.y + oy + 14);
                ctx.strokeStyle = 'rgba(255, 255, 0, 0.4)';
                ctx.strokeRect(obj.x + ox - 2, obj.y + oy, obj.w + 4, obj.h);
            }
        }
        if (!enTransition) { if (enemies) for (let e of enemies) dessinerMonstre(e, ox, oy); }
        else { if (s.ennemis) for (let e of s.ennemis) dessinerMonstre(e, ox, oy); }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (gameState === 'TITLE') {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = 'center'; ctx.fillStyle = '#ff3333'; ctx.font = 'bold 24px sans-serif';
            ctx.fillText("DEFI4 - PATROID", canvas.width / 2, 40);
            ctx.fillStyle = '#1a1a1a'; ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
            ctx.fillRect(20, 55, canvas.width - 40, 70); ctx.strokeRect(20, 55, canvas.width - 40, 70);
            ctx.textAlign = 'left'; ctx.fillStyle = '#00ffcc'; ctx.font = 'bold 11px monospace';
            ctx.fillText("CHOIX DE LA DIFFICULTÉ :", 30, 75);
            boutonsMenu.forEach(n => {
                let lbl = n.id === 0 ? "NIV. 0 (3x1)" : n.id === 1 ? "NIV. 1 (2x2)" : n.id === 2 ? "NIV. 2 (3x3)" : "NIV. 3 (5x5)";
                ctx.fillStyle = niveauChoisi === n.id ? '#ff3333' : '#333';
                ctx.fillRect(n.x, n.y, n.w, n.h);
                ctx.strokeStyle = niveauChoisi === n.id ? '#fff' : '#555';
                ctx.strokeRect(n.x, n.y, n.w, n.h);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
                ctx.fillText(lbl, n.x + n.w / 2, n.y + 16);
            });
            ctx.textAlign = 'center'; ctx.fillStyle = '#fff'; ctx.font = '11px sans-serif';
            ctx.fillText("Ramassez tous les chiffres dans l'ordre croissant.", canvas.width / 2, 160);
            ctx.fillStyle = '#ff9999';
            ctx.fillText("START pour lancer le jeu, PAUSE pour l'arrêter.", canvas.width / 2, 185);
            if (Math.floor(Date.now() / 400) % 2 === 0) {
                ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 11px monospace';
                ctx.fillText("APPUYEZ SUR L'ÉCRAN / START POUR JOUER", canvas.width / 2, 245);
            }
            return;
        }

        if (gameState === 'PAUSE') {
            ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = 'center'; ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 26px sans-serif';
            ctx.fillText("PAUSE", canvas.width / 2, 130);
            ctx.fillStyle = '#fff'; ctx.font = '11px monospace';
            ctx.fillText("Appuyez sur START pour reprendre", canvas.width / 2, 170);
            return;
        }

        if (gameState === 'GAMEOVER') {
            ctx.fillStyle = 'rgba(20,0,0,0.9)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = 'center'; ctx.fillStyle = '#ff3333'; ctx.font = 'bold 28px sans-serif';
            ctx.fillText("GAME OVER", canvas.width / 2, 120);
            ctx.fillStyle = '#fff'; ctx.font = '13px monospace';
            ctx.fillText("Énergie épuisée ou mauvaise cible !", canvas.width / 2, 155);
            ctx.fillStyle = '#ffcc00'; ctx.font = '11px monospace';
            ctx.fillText("APPUYEZ SUR START POUR RECOMMENCER", canvas.width / 2, 210);
            return;
        }

        if (gameState === 'VICTORY') {
            ctx.fillStyle = 'rgba(0,20,10,0.9)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = 'center'; ctx.fillStyle = '#00ffcc'; ctx.font = 'bold 26px sans-serif';
            ctx.fillText("MISSION REUSSIE !", canvas.width / 2, 110);
            ctx.fillStyle = '#fff'; ctx.font = '14px monospace';
            ctx.fillText("Tous les objectifs du niveau sont validés.", canvas.width / 2, 145);
            ctx.fillText("Score Final : " + score.toString().padStart(6, '0'), canvas.width / 2, 170);
            ctx.fillStyle = '#ffcc00'; ctx.font = '11px monospace';
            ctx.fillText("APPUYEZ SUR START POUR REVENIR", canvas.width / 2, 220);
            return;
        }

        if (enTransition) {
            if      (transitionType === "bas")    { dessinerContenuSalle(ancX, ancY, 0, offsetCamY); dessinerContenuSalle(nouvX, nouvY, 0, offsetCamY + canvas.height); }
            else if (transitionType === "haut")   { dessinerContenuSalle(ancX, ancY, 0, offsetCamY); dessinerContenuSalle(nouvX, nouvY, 0, offsetCamY - canvas.height); }
            else if (transitionType === "droite") { dessinerContenuSalle(ancX, ancY, offsetCamX, 0); dessinerContenuSalle(nouvX, nouvY, offsetCamX + canvas.width, 0); }
            else if (transitionType === "gauche") { dessinerContenuSalle(ancX, ancY, offsetCamX, 0); dessinerContenuSalle(nouvX, nouvY, offsetCamX - canvas.width, 0); }
        } else {
            dessinerContenuSalle(carteX, carteY, 0, 0);
        }

        ctx.fillStyle = '#ffcc00';
        for (let b of bullets) ctx.fillRect(b.x, b.y, b.taille, b.taille);

        dessinerJoueur();

        ctx.textAlign = 'left';
        ctx.fillStyle = '#fff'; ctx.font = '10px monospace';
        ctx.fillText("EN " + player.energie + " | OBJ: " + chiffresTrouves + "/" + totalChiffres, 15, 20);
        ctx.fillStyle = '#555'; ctx.fillRect(55, 25, 50, 6);
        ctx.fillStyle = '#00ffcc'; ctx.fillRect(55, 25, (player.energie / player.maxEnergie) * 50, 6);
        ctx.fillStyle = '#ffff00'; ctx.font = '11px monospace';
        ctx.fillText("SCORE: " + score.toString().padStart(6, '0'), 15, 42);
    }

    function gameLoop() {
        try { update(); draw(); } catch(err) { console.error("Erreur : ", err); }
        requestAnimationFrame(gameLoop);
    }

    // ===================== HIGHSCORES =====================
    const HS_KEYS   = ['highscore_niv0','highscore_niv1','highscore_niv2','highscore_niv3'];
    const HS_LABELS = ['NIV. 0 (3×1)','NIV. 1 (2×2)','NIV. 2 (3×3)','NIV. 3 (5×5)'];

    function hsLire(niv)    { try { return JSON.parse(localStorage.getItem(HS_KEYS[niv])) || []; } catch(e) { return []; } }
    function hsEcrire(niv, data) { localStorage.setItem(HS_KEYS[niv], JSON.stringify(data)); }
    function hsAjouter(niv, nom, scoreVal) {
        let data = hsLire(niv);
        data.push({ nom: nom.trim().toUpperCase() || 'AAA', score: scoreVal });
        data.sort((a, b) => b.score - a.score);
        data = data.slice(0, 10);
        hsEcrire(niv, data);
    }

    const btnHighscoreOv = document.getElementById('btn-hs-ov');
    function majVisibiliteHs() { btnHighscoreOv.style.display = gameState === 'TITLE' ? 'inline-block' : 'none'; }

    const saisieOverlay     = document.getElementById('saisie-overlay');
    const saisieInput       = document.getElementById('saisie-input');
    const saisieScoreAffiche= document.getElementById('saisie-score-affiche');
    const saisieTitre       = document.getElementById('saisie-titre');
    const saisieValider     = document.getElementById('saisie-valider');
    let scoreAEnregistrer = 0, niveauAEnregistrer = 0;

    function afficherSaisieNom(estVictoire) {
        scoreAEnregistrer = score; niveauAEnregistrer = niveauChoisi;
        saisieTitre.textContent       = estVictoire ? '🎉 MISSION RÉUSSIE !' : '💀 GAME OVER';
        saisieScoreAffiche.textContent = 'SCORE : ' + score.toString().padStart(6, '0');
        saisieInput.value = '';
        saisieOverlay.classList.add('visible');
        setTimeout(() => saisieInput.focus(), 100);
    }
    function validerSaisie() {
        let nom = saisieInput.value.trim().toUpperCase() || 'AAA';
        hsAjouter(niveauAEnregistrer, nom, scoreAEnregistrer);
        saisieOverlay.classList.remove('visible');
        recommencerJeu();
    }
    saisieValider.addEventListener('click', validerSaisie);
    saisieValider.addEventListener('touchstart', (e) => { e.preventDefault(); validerSaisie(); }, { passive: false });
    saisieInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') validerSaisie(); });

    const hsOverlay = document.getElementById('hs-overlay');
    const hsListe   = document.getElementById('hs-liste');
    const hsNiveauLabel = document.getElementById('hs-niveau-label');
    let hsNiveauActuel = 0;

    function afficherHsNiveau(niv) {
        hsNiveauActuel = niv;
        hsNiveauLabel.textContent = HS_LABELS[niv];
        let data = hsLire(niv);
        if (data.length === 0) { hsListe.innerHTML = '<div style="color:#555; padding:8px 0;">Aucun score enregistré.</div>'; return; }
        let html = '<table style="width:100%; border-collapse:collapse;">';
        html += '<tr style="color:#00ffcc; border-bottom:1px solid #333;"><th style="text-align:left;padding:3px 6px;">#</th><th style="text-align:left;padding:3px 6px;">NOM</th><th style="text-align:right;padding:3px 6px;">SCORE</th></tr>';
        for (let i = 0; i < data.length; i++) {
            let c = i === 0 ? '#ffcc00' : i === 1 ? '#cccccc' : i === 2 ? '#cc8844' : '#ffffff';
            html += `<tr style="color:${c}; border-bottom:1px solid #1a1a1a;"><td style="padding:4px 6px;">${i+1}</td><td style="padding:4px 6px;">${data[i].nom}</td><td style="text-align:right;padding:4px 6px;">${data[i].score.toString().padStart(6,'0')}</td></tr>`;
        }
        html += '</table>';
        hsListe.innerHTML = html;
    }

    btnHighscoreOv.addEventListener('click', () => { afficherHsNiveau(niveauChoisi); hsOverlay.classList.add('visible'); });
    btnHighscoreOv.addEventListener('touchstart', (e) => { e.preventDefault(); afficherHsNiveau(niveauChoisi); hsOverlay.classList.add('visible'); }, { passive: false });
    document.getElementById('hs-prev').addEventListener('click', () => afficherHsNiveau((hsNiveauActuel + 3) % 4));
    document.getElementById('hs-next').addEventListener('click', () => afficherHsNiveau((hsNiveauActuel + 1) % 4));
    document.getElementById('hs-fermer').addEventListener('click', () => hsOverlay.classList.remove('visible'));
    document.getElementById('hs-fermer').addEventListener('touchstart', (e) => { e.preventDefault(); hsOverlay.classList.remove('visible'); }, { passive: false });

    // ===================== INIT =====================
    niveauChoisi = 0; tailleMonde = 3; tailleMondeH = 1;
    genererMonde(3, 1);
    dessinerMinimap();
    majVisibiliteHs();
    gameLoop();
</script>
</body>
</html>
